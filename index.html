<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e1e1e; border-left: 5px solid #8e44ad; padding: 15px; margin: 10px 0; border-radius: 8px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #27ae60; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login">
        <input type="text" id="u" placeholder="İsim">
        <input type="password" id="s" placeholder="Şifre">
        <button onclick="giris()">GİRİŞ</button>
    </div>
    <div id="main" style="display:none;"><div id="list"></div></div>

    <script>
        const conf = { databaseURL: "https://gunter-erp-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let usta = "";

        function giris() {
            usta = document.getElementById('u').value;
            const sifre = document.getElementById('s').value;
            db.ref('personeller/' + usta).once('value', (s) => {
                const d = s.val();
                if(d && d.sifre === sifre) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('main').style.display = 'block';
                    isleriCek(d.bolum);
                } else { alert("Hata!"); }
            });
        }

        function isleriCek(bolum) {
            db.ref('bolum_isleri/' + bolum).on('value', (snap) => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(id => {
                        const is = data[id];
                        list.innerHTML += `
                            <div class="card">
                                <b>Hedef: ${is.hedef} | Kalan: ${is.hedef - is.tamamlanan}</b>
                                <input type="number" id="i-${id}" placeholder="Toplam Biten Kaç?">
                                <button onclick="guncelle('${bolum}','${id}')">BİTENİ GÜNCELLE</button>
                            </div>`;
                    });
                }
            });
        }

        function guncelle(b, id) {
            const val = parseInt(document.getElementById('i-' + id).value);
            if(!isNaN(val)) db.ref('bolum_isleri/' + b + '/' + id).update({ tamamlanan: val, personel: usta });
        }
    </script>
</body>
</html>
