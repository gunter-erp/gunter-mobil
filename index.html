<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 15px; text-align: center; }
        .card { background: #1e1e1e; border-left: 5px solid #8e44ad; padding: 20px; margin: 15px 0; border-radius: 10px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .plus { background: #27ae60; color: white; height: 80px; font-size: 24px; }
        .minus { background: #c0392b; color: white; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="login">
        <input type="text" id="u" placeholder="Usta Adı" style="width:90%; padding:10px; margin:10px;">
        <input type="password" id="s" placeholder="Şifre" style="width:90%; padding:10px; margin:10px;">
        <button onclick="giris()" style="background:#8e44ad">SİSTEME GİRİŞ</button>
    </div>

    <div id="main" style="display:none;">
        <h2 id="welcome"></h2>
        <div id="list"></div>
    </div>

    <script>
        const conf = { databaseURL: "https://gunter-erp-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const db = firebase.database();
        let usta = ""; let bolum = "";

        function giris() {
            usta = document.getElementById('u').value;
            const sifre = document.getElementById('s').value;
            db.ref('personeller/' + usta).once('value', (s) => {
                const d = s.val();
                if(d && d.sifre === sifre) {
                    bolum = d.bolum;
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('main').style.display = 'block';
                    document.getElementById('welcome').innerText = usta;
                    isleriCek();
                } else { alert("Hata!"); }
            });
        }

        function isleriCek() {
            db.ref('bolum_isleri/' + bolum).on('value', (snap) => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(id => {
                        const is = data[id];
                        list.innerHTML += `
                            <div class="card">
                                <h3>HEDEF: ${is.hedef}</h3>
                                <h1 style="color:#2ecc71">${is.tamamlanan} BİTTİ</h1>
                                <h2 style="color:#f1c40f">KALAN: ${is.hedef - is.tamamlanan}</h2>
                                <button class="plus" onclick="degistir('${id}', 1)">BİR ADET BİTİRDİM (+)</button>
                                <button class="minus" onclick="degistir('${id}', -1)">Yanlış Bastım (-1)</button>
                            </div>`;
                    });
                }
            });
        }

        function degistir(id, miktar) {
            const ref = db.ref('bolum_isleri/' + bolum + '/' + id + '/tamamlanan');
            ref.transaction((current) => {
                return (current || 0) + miktar;
            });
        }
    </script>
</body>
</html>
