<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günter ERP Mobil</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #8e44ad; text-align: left; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
        .progress-container { background: #333; border-radius: 5px; height: 10px; margin: 10px 0; }
        .progress-bar { background: #f1c40f; height: 100%; border-radius: 5px; transition: width 0.3s; }
        .finished { border-left-color: #2ecc71; }
        .finished .progress-bar { background: #2ecc71; }
    </style>
</head>
<body>
    <h2>GÜNTER ELEKTRONİK</h2>
    
    <div id="login-screen">
        <input type="text" id="username" placeholder="Usta Adınız">
        <select id="user-dept">
            <option value="Kaynak Bölümü">Kaynak Bölümü</option>
            <option value="Baskül Montaj">Baskül Montaj</option>
            <option value="Elektronik Bölümü">Elektronik Bölümü</option>
        </select>
        <button onclick="sistemiAc()">SİSTEMİ AÇ</button>
    </div>

    <div id="main-screen" style="display:none;">
        <h3 id="welcome-msg"></h3>
        <div id="job-list"></div>
    </div>

    <script>
        // FIREBASE AYARLARIN - BURAYI KENDİ ADRESİNLE KONTROL ET USTA
        const firebaseConfig = { databaseURL: "https://gunter-erp-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let ustaAdi = "";
        let bolum = "";

        function sistemiAc() {
            ustaAdi = document.getElementById('username').value.trim();
            bolum = document.getElementById('user-dept').value;
            if(!ustaAdi) return alert("İsim yaz usta!");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Hoş Geldin " + ustaAdi;
            
            isleriGetir();
        }

        function isleriGetir() {
            db.ref('bolum_isleri/' + bolum).on('value', (snapshot) => {
                const listDiv = document.getElementById('job-list');
                listDiv.innerHTML = "";
                const data = snapshot.val();
                
                if(data) {
                    Object.keys(data).forEach(isID => {
                        const is = data[isID];
                        const yuzde = (is.tamamlanan / is.hedef) * 100;
                        const kalan = is.hedef - is.tamamlanan;
                        
                        let cardClass = "card";
                        if(yuzde >= 100) cardClass += " finished";

                        listDiv.innerHTML += `
                            <div class="${cardClass}">
                                <b>Ürün: ${is.urun}</b><br>
                                Hedef: ${is.hedef} | Biten: ${is.tamamlanan} | <b>Kalan: ${kalan}</b>
                                <div class="progress-container">
                                    <div class="progress-bar" style="width: ${yuzde}%"></div>
                                </div>
                                <input type="number" id="inp-${isID}" placeholder="Toplam Biten Sayı">
                                <button onclick="guncelle('${isID}')" style="background:#2980b9">ADET GÜNCELLE</button>
                            </div>
                        `;
                    });
                } else {
                    listDiv.innerHTML = "<p>Bu bölümde şu an iş yok usta.</p>";
                }
            });
        }

        function guncelle(isID) {
            const yeniAdet = parseInt(document.getElementById('inp-' + isID).value);
            if(isNaN(yeniAdet)) return alert("Sayı gir usta!");

            // Bilgisayara "Toplam Biten Budur" diye gönderiyoruz
            db.ref('bolum_isleri/' + bolum + '/' + isID).update({
                tamamlanan: yeniAdet,
                personel: ustaAdi,
                durum: yeniAdet >= 1 ? "Devam Ediyor" : "Bekliyor"
            }).then(() => {
                alert("Üretim güncellendi!");
            });
        }
    </script>
</body>
</html>
