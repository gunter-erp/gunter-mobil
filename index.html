<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Günter Mobil ERP v8.2.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #8e44ad; text-align: left; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #27ae60; color: white; font-weight: bold; cursor: pointer; }
        .progress-container { background: #333; border-radius: 5px; height: 12px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: #f1c40f; height: 100%; transition: width 0.4s; }
        .full { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <h2>GÜNTER ERP GÜVENLİK</h2>
    <div id="login-screen">
        <input type="text" id="username" placeholder="Usta Adınız">
        <input type="password" id="userpass" placeholder="Şifreniz">
        <select id="user-dept">
            <option value="Kaynak Bölümü">Kaynak Bölümü</option>
            <option value="Baskül Montaj">Baskül Montaj</option>
            <option value="Elektronik Bölümü">Elektronik Bölümü</option>
        </select>
        <button onclick="sistemiAc()">SİSTEME GİRİŞ</button>
    </div>

    <div id="main-screen" style="display:none;">
        <h3 id="welcome-msg"></h3>
        <div id="job-list"></div>
        <button onclick="location.reload()" style="background:#c0392b">GÜVENLİ ÇIKIŞ</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://gunter-erp-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let ustaAdi = ""; let secilenBolum = "";

        function sistemiAc() {
            ustaAdi = document.getElementById('username').value.trim();
            const sifre = document.getElementById('userpass').value.trim();
            secilenBolum = document.getElementById('user-dept').value;

            db.ref('personeller/' + ustaAdi).once('value', (snap) => {
                const p = snap.val();
                if(p && p.sifre === sifre) {
                    // Şifre doğru, ama seçtiği bölüm personelin kayıtlı olduğu bölüm mü?
                    if(p.bolum === secilenBolum) {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('main-screen').style.display = 'block';
                        document.getElementById('welcome-msg').innerText = ustaAdi + " [" + secilenBolum + "]";
                        isleriGetir();
                    } else {
                        alert("Hata: Kayıtlı olduğunuz bölümü seçmelisiniz: " + p.bolum);
                    }
                } else { alert("İsim veya Şifre Hatalı!"); }
            });
        }

        function isleriGetir() {
            db.ref('bolum_isleri/' + secilenBolum).on('value', (snap) => {
                const list = document.getElementById('job-list');
                list.innerHTML = ""; const data = snap.val();
                if(data) {
                    Object.keys(data).forEach(id => {
                        const is = data[id];
                        const y = (is.tamamlanan / is.hedef) * 100;
                        list.innerHTML += `
                            <div class="card">
                                <b>Ürün: ${is.urun}</b><br>
                                Hedef: ${is.hedef} | Biten: ${is.tamamlanan} | <b>KALAN: ${is.hedef - is.tamamlanan}</b>
                                <div class="progress-container"><div class="progress-bar ${y>=100?'full':''}" style="width:${y}%"></div></div>
                                <input type="number" id="inp-${id}" placeholder="Şu an toplam kaç bitti?">
                                <button onclick="guncelle('${id}', ${is.hedef})" style="background:#2980b9">GÜNCELLE</button>
                            </div>`;
                    });
                } else { list.innerHTML = "Şu an bu bölümde iş yok usta."; }
            });
        }

        function guncelle(id, hedef) {
            const val = parseInt(document.getElementById('inp-' + id).value);
            if(isNaN(val)) return alert("Sayı gir usta!");
            if(val > hedef) {
                alert("Hata: Hedeflenen sayıdan (" + hedef + ") daha fazla ürün giremezsin!");
                return;
            }
            db.ref('bolum_isleri/' + secilenBolum + '/' + id).update({ tamamlanan: val, personel: ustaAdi });
        }
    </script>
</body>
</html>
